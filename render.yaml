services:
  - type: web
    name: mirsad-daily-ops
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd client && npm ci && npm run build && cd ../server && npm ci && npm run build
    startCommand: node server/dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
